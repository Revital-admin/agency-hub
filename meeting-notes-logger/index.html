<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Notes & Action Items Logger</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../vars.css">
  <link rel="stylesheet" href="../shared-components.css">
  <link rel="stylesheet" href="../forms.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="module-body">
  <div class="module-container">
    <div class="module-header">
      <div class="module-header-left">
        <div class="module-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </div>
        <div>
          <h2>Meeting Notes & Action Items</h2>
          <p>Log client syncs and track open action items.</p>
        </div>
      </div>
      <div class="module-header-right">
      </div>
    </div>

    <div class="split-layout">
      <!-- LEFT: Client Selection & Summary -->
      <div class="left-panel">
        <div class="card">
          <div class="form-group">
            <label>Select Client</label>
            <select id="clientSelect" class="form-control"></select>
          </div>
        </div>

        <div class="card summary-card" id="summaryCard" style="display: none;">
          <h3>Action Items Overview</h3>
          <div class="stats-grid">
            <div class="stat-box">
              <span class="stat-label">Open</span>
              <span class="stat-value text-red" id="statOpen">0</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Completed</span>
              <span class="stat-value text-green" id="statCompleted">0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Note Editor -->
      <div class="right-panel">
        <div class="card empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
          <h3>Select a client</h3>
          <p>Choose a client on the left to view or add meeting notes.</p>
        </div>

        <div id="notesInterface" style="display: none;">
          <div class="card create-card">
            <h3>Log New Meeting</h3>
            <div class="form-row">
              <div class="form-group" style="flex:1">
                <label>Meeting Date</label>
                <input type="date" id="newDate" class="form-control">
              </div>
              <div class="form-group" style="flex:2">
                <label>Meeting Title (e.g. Monthly Sync)</label>
                <input type="text" id="newTitle" class="form-control" placeholder="Optional title">
              </div>
            </div>
            <div class="form-group">
              <label>Notes / Takeaways</label>
              <textarea id="newSummary" class="form-control" rows="3" placeholder="What was discussed?"></textarea>
            </div>
            <div class="form-group">
              <label>Action Items (Syncs to Client Portal)</label>
              <div id="newActionItemsList" class="action-items-builder">
                <!-- Action items inputs will be added here -->
              </div>
              <button class="btn-secondary sm mt-2" id="addActionItemBtn">+ Add Action Item</button>
            </div>
            <div class="form-actions mt-4">
              <button class="btn-primary" id="saveMeetingBtn">Save Meeting Notes</button>
            </div>
          </div>

          <div class="history-section mt-4">
            <h3>Past Meetings</h3>
            <div id="meetingsList" class="meetings-timeline"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
