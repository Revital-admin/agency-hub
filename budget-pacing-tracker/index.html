<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retainer / Budget Pacing Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../vars.css">
  <link rel="stylesheet" href="../shared-components.css">
  <link rel="stylesheet" href="../forms.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="module-body">
  <div class="module-container">
    <div class="module-header">
      <div class="module-header-left">
        <div class="module-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        </div>
        <div>
          <h2>Budget & Retainer Pacing</h2>
          <p>Track client ad spend and retainer hours against their monthly caps.</p>
        </div>
      </div>
      <div class="module-header-right">
        <button class="btn-primary" id="addTrackerBtn">+ Track New Client</button>
      </div>
    </div>

    <div class="top-controls">
      <div class="form-group" style="margin-bottom:0">
        <select id="newClientSelect" class="form-control" style="width: 250px;">
          <!-- Populated via JS -->
        </select>
      </div>
    </div>

    <div class="tracker-list" id="trackerList">
      <!-- Pacing cards will be rendered here -->
    </div>
    
    <div class="card empty-state" id="emptyState" style="display:none; margin-top:24px;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      <h3>No Budgets Tracked</h3>
      <p>Select a client from the dropdown above to start tracking their budget pacing.</p>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
